services:
  api:
    build: .
    container_name: desktop-stock-api
    ports:
      - "${API_PORT}:${API_PORT}"
    volumes:
      - ./stock.db:/app/stock.db
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    user: "1000:1000"  # Reemplaza con tu UID:GID (ejecuta 'id -u' y 'id -g' en el host)
    # command: uvicorn main:app --host 0.0.0.0 --port ${API_PORT}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_PORT}/api/v1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s